<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Cliente - KinalApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== VARIABLES GLOBALES ========== */
        :root {
            --primary:        #2563eb;
            --primary-dark:   #1d4ed8;
            --primary-light:  #eff6ff;
            --success:        #059669;
            --success-light:  #ecfdf5;
            --danger:         #dc2626;
            --danger-light:   #fef2f2;
            --warning:        #d97706;
            --warning-light:  #fffbeb;
            --gray-50:        #f8fafc;
            --gray-100:       #f1f5f9;
            --gray-200:       #e2e8f0;
            --gray-500:       #64748b;
            --gray-700:       #334155;
            --gray-900:       #0f172a;
            --white:          #ffffff;
            --radius:         8px;
            --radius-lg:      12px;
            --shadow-sm:      0 1px 3px rgba(0,0,0,.08);
            --shadow:         0 4px 12px rgba(0,0,0,.1);
            --shadow-lg:      0 8px 24px rgba(0,0,0,.12);
            --transition:     .2s ease;
        }

        /* ========== RESET Y ESTILOS BASE ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: var(--gray-100);
            color: var(--gray-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== BARRA DE NAVEGACIÓN ========== */
        .navbar {
            background: var(--gray-900);
            height: 60px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,.25);
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -.02em;
        }
        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 2px;
            list-style: none;
        }
        .navbar-nav a {
            color: rgba(255,255,255,.65);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: var(--radius);
            font-size: .85rem;
            font-weight: 600;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .navbar-nav a:hover {
            background: rgba(255,255,255,.1);
            color: var(--white);
        }
        .navbar-nav a.active {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 2px 8px rgba(37,99,235,.45);
        }
        .navbar-user .btn-logout {
            background: rgba(220,38,38,.2);
            color: #fca5a5;
            border: 1px solid rgba(220,38,38,.3);
            padding: 5px 12px;
            border-radius: var(--radius);
            font-size: .8rem;
            font-weight: 700;
            text-decoration: none;
            transition: background var(--transition);
            font-family: inherit;
            cursor: pointer;
        }
        .navbar-user .btn-logout:hover { background: rgba(220,38,38,.35); }

        /* ========== CONTENIDO PRINCIPAL ========== */
        .page-content {
            flex: 1;
            padding: 28px 32px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* ========== ENCABEZADO ========== */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--gray-900);
            letter-spacing: -.02em;
        }

        /* ========== TARJETA DEL FORMULARIO ========== */
        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            padding: 28px 32px;
            max-width: 560px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: .8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 13px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: .875rem;
            font-family: inherit;
            color: var(--gray-900);
            background: var(--white);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
            font-weight: 500;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }
        .form-group input[readonly] {
            background: var(--gray-100);
            color: var(--gray-500);
            cursor: not-allowed;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-100);
        }

        /* ========== BOTONES ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: .85rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity var(--transition), transform var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn:hover { opacity: .88; transform: translateY(-1px); }
        .btn-success { background: var(--success); color: var(--white); }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }

        /* ========== PIE DE PÁGINA ========== */
        footer {
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            color: var(--gray-500);
            text-align: center;
            padding: 14px;
            font-size: .78rem;
            font-weight: 600;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; height: auto; flex-wrap: wrap; gap: 8px; padding-block: 10px; }
            .navbar-nav { gap: 1px; flex-wrap: wrap; }
            .navbar-nav a { font-size: .78rem; padding: 5px 8px; }
            .page-content { padding: 16px; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- ========== BARRA DE NAVEGACIÓN ========== -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/web/menu}"><img src="/css/logo.png" alt="KinalApp Logo" style="height:48px;width:auto;object-fit:contain;"></a>
    <ul class="navbar-nav">
        <li><a th:href="@{/web/menu}">🏠 Inicio</a></li>
        <li><a th:href="@{/clientes/web}" class="active">👥 Clientes</a></li>
        <li><a th:href="@{/productos/web}">📦 Productos</a></li>
        <li><a th:href="@{/usuarios/web}">👤 Usuarios</a></li>
        <li><a th:href="@{/ventas/web}">💰 Ventas</a></li>
        <li><a th:href="@{/detalleventa/web}">🧾 Det. Ventas</a></li>
    </ul>
    <div class="navbar-user">
        <a th:href="@{/logout}" class="btn-logout">🚪 Salir</a>
    </div>
</nav>

<!-- ========== CONTENIDO PRINCIPAL ========== -->
<div class="page-content">
    <div class="page-header">
        <!-- Título dinámico: Nuevo o Editar según exista DPI -->
        <h2 th:text="${cliente.dpiCliente == null} ? '➕ Nuevo Cliente' : '✏️ Editar Cliente'">Formulario</h2>
    </div>
    <div class="form-card">
        <!-- Formulario: acción diferente para guardar o actualizar -->
        <form th:action="${cliente.dpiCliente == null} ? @{/clientes/web/guardar} : @{/clientes/web/actualizar/{dpi}(dpi=${cliente.dpiCliente})}"
              th:object="${cliente}" method="post">
            <div class="form-group">
                <label>🪪 DPI o CUI</label>
                <input type="number" th:field="*{dpiCliente}" th:readonly="${cliente.dpiCliente != null}" placeholder="Número de DPI">
            </div>
            <div class="form-group">
                <label>👤 Nombre</label>
                <input type="text" th:field="*{nombreCliente}" placeholder="Nombre del cliente" required>
            </div>
            <div class="form-group">
                <label>👤 Apellido</label>
                <input type="text" th:field="*{apellidoCliente}" placeholder="Apellido del cliente" required>
            </div>
            <div class="form-group">
                <label>📍 Dirección</label>
                <input type="text" th:field="*{direccion}" placeholder="Dirección" required>
            </div>
            <div class="form-group">
                <label>🔘 Estado</label>
                <select th:field="*{estado}">
                    <option value="1">Activo</option>
                    <option value="0">Inactivo</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-success">💾 Guardar</button>
                <a th:href="@{/clientes/web}" class="btn btn-secondary">← Cancelar</a>
            </div>
        </form>
    </div>
</div>

<footer><p>&copy; 2025 KinalApp — Sistema de Ventas</p></footer>
</body>
</html>
