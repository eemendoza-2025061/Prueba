<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - KinalApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* (mismo CSS base que el formulario, pero con estilos adicionales para tablas y badges) */
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --primary-light: #eff6ff;
            --success: #059669; --success-light: #ecfdf5;
            --danger: #dc2626; --danger-light: #fef2f2;
            --warning: #d97706; --warning-light: #fffbeb;
            --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
            --gray-500: #64748b; --gray-700: #334155; --gray-900: #0f172a;
            --white: #ffffff;
            --radius: 8px; --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
            --transition: .2s ease;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Nunito', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; display: flex; flex-direction: column; }

        /* NAVBAR (idéntico al anterior) */
        .navbar { background: var(--gray-900); height: 60px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); font-size: 1.15rem; font-weight: 800; }
        .navbar-nav { display: flex; align-items: center; gap: 2px; list-style: none; }
        .navbar-nav a { color: rgba(255,255,255,.65); text-decoration: none; padding: 6px 12px; border-radius: var(--radius); font-size: .85rem; font-weight: 600; transition: background var(--transition); display: flex; align-items: center; gap: 5px; }
        .navbar-nav a:hover { background: rgba(255,255,255,.1); color: var(--white); }
        .navbar-nav a.active { background: var(--primary); color: var(--white); box-shadow: 0 2px 8px rgba(37,99,235,.45); }
        .navbar-user .btn-logout { background: rgba(220,38,38,.2); color: #fca5a5; border: 1px solid rgba(220,38,38,.3); padding: 5px 12px; border-radius: var(--radius); font-size: .8rem; font-weight: 700; text-decoration: none; transition: background .2s; cursor: pointer; }
        .navbar-user .btn-logout:hover { background: rgba(220,38,38,.35); }

        /* CONTENIDO */
        .page-content { flex: 1; padding: 28px 32px; max-width: 1200px; width: 100%; margin: 0 auto; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .page-header h2 { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); letter-spacing: -.02em; }

        /* TABLA */
        .table-wrapper { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--gray-900); }
        th { padding: 12px 16px; text-align: left; font-size: .75rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.75); }
        tbody tr { border-bottom: 1px solid var(--gray-100); transition: background .15s; }
        tbody tr:hover { background: var(--gray-50); }
        td { padding: 12px 16px; font-size: .875rem; color: var(--gray-700); font-weight: 500; }

        /* BADGES */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .73rem; font-weight: 700; }
        .badge-active { background: var(--success-light); color: var(--success); }
        .badge-inactive { background: var(--danger-light); color: var(--danger); }

        /* BOTONES */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: .85rem; font-weight: 700; text-decoration: none; cursor: pointer; border: none; transition: opacity .2s; font-family: inherit; white-space: nowrap; }
        .btn:hover { opacity: .85; transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-warning { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; font-size: .78rem; padding: 5px 10px; }
        .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #fecaca; font-size: .78rem; padding: 5px 10px; }

        /* ALERTAS */
        .alert { padding: 11px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: .875rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .alert-success { background: var(--success-light); color: var(--success); border-left: 4px solid var(--success); }
        .alert-error { background: var(--danger-light); color: var(--danger); border-left: 4px solid var(--danger); }

        footer { background: var(--white); border-top: 1px solid var(--gray-200); color: var(--gray-500); text-align: center; padding: 14px; font-size: .78rem; font-weight: 600; }
        @media (max-width: 768px) { .navbar { padding: 0 16px; height: auto; flex-wrap: wrap; } .navbar-nav a { font-size: .78rem; padding: 5px 8px; } .page-content { padding: 16px; } }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/web/menu}"><img src="/css/logo.png" alt="KinalApp Logo" style="height:48px;width:auto;object-fit:contain;"></a>
    <ul class="navbar-nav">
        <li><a th:href="@{/web/menu}">🏠 Inicio</a></li>
        <li><a th:href="@{/clientes/web}" class="active">👥 Clientes</a></li>
        <li><a th:href="@{/productos/web}">📦 Productos</a></li>
        <li><a th:href="@{/usuarios/web}">👤 Usuarios</a></li>
        <li><a th:href="@{/ventas/web}">💰 Ventas</a></li>
        <li><a th:href="@{/detalleventa/web}">🧾 Det. Ventas</a></li>
    </ul>
    <div class="navbar-user"><a th:href="@{/logout}" class="btn-logout">🚪 Salir</a></div>
</nav>
<div class="page-content">
    <div class="page-header">
        <h2>👥 Clientes</h2>
        <a th:href="@{/clientes/web/nuevo}" class="btn btn-primary">➕ Nuevo Cliente</a>
    </div>
    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>DPI o CUI</th><th>Nombre</th><th>Apellido</th><th>Dirección</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
            <tr th:each="c : ${clientes}">
                <td th:text="${c.dpiCliente}"></td>
                <td th:text="${c.nombreCliente}"></td>
                <td th:text="${c.apellidoCliente}"></td>
                <td th:text="${c.direccion}"></td>
                <td><span class="badge" th:classappend="${c.estado == 1} ? 'badge-active' : 'badge-inactive'" th:text="${c.estado == 1} ? 'Activo' : 'Inactivo'"></span></td>
                <td style="display:flex;gap:6px;">
                    <a th:href="@{/clientes/web/editar/{dpi}(dpi=${c.dpiCliente})}" class="btn btn-warning">✏️ Editar</a>
                    <a th:href="@{/clientes/web/eliminar/{dpi}(dpi=${c.dpiCliente})}" class="btn btn-danger" onclick="return confirm('¿Eliminar este cliente?')">🗑️ Eliminar</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clientes)}"><td colspan="6" style="text-align:center;color:#6b7280;padding:24px;">No hay clientes registrados.</td></tr>
            </tbody>
        </table>
    </div>
</div>
<footer><p>&copy; 2025 KinalApp — Sistema de Ventas</p></footer>
</body>
</html>
